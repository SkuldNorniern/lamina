---
name: "pre-release"

on:
  push:
    branches:
      - "main"

permissions:
  contents: write

jobs:
  build:
    name: "Build & Test"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --release --verbose

      - name: Test
        run: cargo test --verbose

      - name: Clippy
        run: cargo clippy --release -- -D warnings

      - name: Upload Rust binary
        uses: actions/upload-artifact@v4
        with:
          name: lamina-binary
          path: target/release/lamina
          if-no-files-found: error

  c-sdk:
    name: "C SDK — nightly (${{ matrix.target }})"
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            runner: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-sdk-${{ hashFiles('lamina-c/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-sdk-

      - name: C SDK tests (stable + nightly)
        working-directory: lamina-c
        run: |
          cargo test
          cargo test --features nightly

      - name: Build C SDK stable archive
        working-directory: lamina-c
        run: bash scripts/build-sdk.sh --release

      - name: Build C SDK nightly archive
        working-directory: lamina-c
        run: bash scripts/build-sdk.sh --release --nightly

      - uses: actions/upload-artifact@v4
        with:
          name: c-sdk-${{ matrix.target }}
          path: lamina-c/dist/
          if-no-files-found: error

  release:
    name: "Update latest pre-release"
    needs: [build, c-sdk]
    runs-on: ubuntu-latest
    concurrency:
      group: pre-release-latest
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Metadata
        id: meta
        run: |
          VERSION=$(grep '^version' lamina-c/Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          DATE=$(date -u +%Y-%m-%d)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "date=$DATE"       >> "$GITHUB_OUTPUT"

      - name: Publish latest pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.meta.outputs.version }}
          DATE=${{ steps.meta.outputs.date }}
          SHA="${{ github.sha }}"
          NOTES_FILE=$(mktemp)
          {
            echo "Automated build from \`main\` — ${DATE}."
            echo ""
            echo "> ⚠️ Pre-release. Not for production use."
            echo ""
            echo "**Commit:** ${SHA}"
            echo ""
            echo "### Lamina binary"
            echo '`lamina` — x86_64 Linux'
            echo ""
            echo "### C SDK ${VERSION}"
            echo "| Archive | Surface |"
            echo "|---------|---------|"
            echo "| \`lamina-c-${VERSION}-stable-x86_64-linux.tar.gz\` | Stable AOT (\`lamina.h\`) |"
            echo "| \`lamina-c-${VERSION}-nightly-x86_64-linux.tar.gz\` | + JIT (\`lamina_nightly.h\`, no ABI guarantee) |"
            echo ""
            echo "Verify: \`sha256sum -c lamina-c-${VERSION}-stable-x86_64-linux.tar.gz.sha256\`"
            echo ""
            echo "See [docs/c-bindings.md](../../blob/main/docs/c-bindings.md)."
          } > "$NOTES_FILE"
          # Try to update existing release in-place; create if it doesn't exist.
          if gh release view latest &>/dev/null; then
            gh release edit latest \
              --prerelease \
              --title "Development Build (${DATE})" \
              --notes-file "$NOTES_FILE"
            # Replace assets: delete old ones, upload new.
            gh release view latest --json assets --jq '.assets[].name' \
              | xargs -r -I{} gh release delete-asset latest {} --yes 2>/dev/null || true
            gh release upload latest \
              artifacts/lamina \
              artifacts/*.tar.gz \
              artifacts/*.sha256
          else
            gh release create latest \
              --prerelease \
              --title "Development Build (${DATE})" \
              --notes-file "$NOTES_FILE" \
              artifacts/lamina \
              artifacts/*.tar.gz \
              artifacts/*.sha256
          fi
          # Update tag to current commit only after assets are live.
          git tag -f latest
          git push origin latest --force

---
name: "tagged-release"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: "Build & Test"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --release --verbose

      - name: Test
        run: cargo test --verbose

      - name: Clippy
        run: cargo clippy --release -- -D warnings

      - name: Upload Rust binary
        uses: actions/upload-artifact@v4
        with:
          name: lamina-binary
          path: target/release/lamina
          if-no-files-found: error

  c-sdk:
    name: "C SDK (${{ matrix.target }})"
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            runner: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-sdk-${{ hashFiles('lamina-c/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-sdk-

      - name: C SDK tests (stable + nightly)
        working-directory: lamina-c
        run: |
          cargo test
          cargo test --features nightly

      - name: Build stable SDK archive
        working-directory: lamina-c
        run: bash scripts/build-sdk.sh --release

      - name: Build nightly SDK archive
        working-directory: lamina-c
        run: bash scripts/build-sdk.sh --release --nightly

      - uses: actions/upload-artifact@v4
        with:
          name: c-sdk-${{ matrix.target }}
          path: lamina-c/dist/
          if-no-files-found: error

  release:
    name: "Publish tagged release"
    needs: [build, c-sdk]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Metadata
        id: meta
        run: |
          VERSION=$(grep '^version' lamina-c/Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish release (permanent — never deleted)
        id: auto_release
        uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          prerelease: false
          title: "Lamina ${{ github.ref_name }}"
          files: |
            artifacts/lamina
            artifacts/*.tar.gz
            artifacts/*.sha256

      - name: Append C SDK info to release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.meta.outputs.version }}
          TAG=${GITHUB_REF_NAME}
          CURRENT=$(gh release view "$TAG" --json body --jq '.body')
          NOTES_FILE=$(mktemp)
          {
            echo "$CURRENT"
            echo ""
            echo "---"
            echo ""
            echo "### C SDK ${VERSION}"
            echo ""
            echo "| Archive | Target | Surface |"
            echo "|---------|--------|---------|"
            echo "| \`lamina-c-${VERSION}-stable-x86_64-linux.tar.gz\` | x86_64-linux | Stable AOT (\`lamina.h\`) |"
            echo "| \`lamina-c-${VERSION}-nightly-x86_64-linux.tar.gz\` | x86_64-linux | + JIT (\`lamina_nightly.h\`) |"
            echo ""
            echo "Each archive includes headers, static + shared library, examples, pkg-config, LICENSE."
            echo ""
            echo '```sh'
            echo "tar xzf lamina-c-${VERSION}-stable-x86_64-linux.tar.gz"
            echo "cd lamina-c-${VERSION}-stable-x86_64-linux"
            echo "cc examples/builder_aot.c -I include -L lib -llamina_c -Wl,-rpath,\$(pwd)/lib -o builder_aot"
            echo "./builder_aot"
            echo '```'
            echo ""
            echo "Verify checksums: \`sha256sum -c lamina-c-${VERSION}-stable-x86_64-linux.tar.gz.sha256\`"
          } > "$NOTES_FILE"
          gh release edit "$TAG" --notes-file "$NOTES_FILE"

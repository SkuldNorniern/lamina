---
name: "tagged-release"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: "Build & Test"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --release --verbose

      - name: Test
        run: cargo test --verbose

      - name: Clippy
        run: cargo clippy --release -- -D warnings

      - name: Upload Rust binary
        uses: actions/upload-artifact@v4
        with:
          name: lamina-binary
          path: target/release/lamina
          if-no-files-found: error

  c-sdk:
    name: "C SDK (${{ matrix.target }})"
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            runner: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-sdk-${{ hashFiles('lamina-c/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-sdk-

      - name: C SDK tests (stable + nightly)
        working-directory: lamina-c
        run: |
          cargo test
          cargo test --features nightly

      - name: Build stable SDK archive
        working-directory: lamina-c
        run: bash scripts/build-sdk.sh

      - name: Build nightly SDK archive
        working-directory: lamina-c
        run: bash scripts/build-sdk.sh --nightly

      - uses: actions/upload-artifact@v4
        with:
          name: c-sdk-${{ matrix.target }}
          path: lamina-c/dist/
          if-no-files-found: error

  release:
    name: "Publish tagged release"
    needs: [build, c-sdk]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Metadata
        id: meta
        run: |
          VERSION=$(grep '^version' lamina-c/Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish release (permanent — never deleted)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.meta.outputs.version }}
          TAG=${GITHUB_REF_NAME}
          gh release create "$TAG" \
            --title "Lamina ${TAG}" \
            --notes "## Lamina ${TAG}

### Lamina compiler
\`lamina\` — x86_64 Linux binary.

### C SDK ${VERSION}

| Archive | Target | Surface |
|---------|--------|---------|
| \`lamina-c-${VERSION}-stable-x86_64-linux.tar.gz\` | x86_64-linux | Stable AOT (\`lamina.h\`) |
| \`lamina-c-${VERSION}-nightly-x86_64-linux.tar.gz\` | x86_64-linux | + JIT (\`lamina_nightly.h\`) |

Each archive includes headers, static + shared library, examples, pkg-config, LICENSE.

\`\`\`sh
tar xzf lamina-c-${VERSION}-stable-x86_64-linux.tar.gz
cd lamina-c-${VERSION}-stable-x86_64-linux
cc examples/builder_aot.c -I include -L lib -llamina_c -Wl,-rpath,\$(pwd)/lib -o builder_aot
./builder_aot
\`\`\`

Verify checksums: \`sha256sum -c lamina-c-${VERSION}-stable-x86_64-linux.tar.gz.sha256\`

See [docs/c-bindings.md](../../blob/main/docs/c-bindings.md)." \
            artifacts/lamina \
            artifacts/*.tar.gz \
            artifacts/*.sha256
